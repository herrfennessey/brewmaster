name: Deploy

on:
  push:
    branches: [main]
    paths-ignore:
      - 'infra/**'
      - '**.md'
  workflow_dispatch:

concurrency:
  group: deploy-production
  cancel-in-progress: false

env:
  REGION: europe-west3
  SERVICE_NAME: brewmaster

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: production
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v3
        with:
          workload_identity_provider: ${{ secrets.WIF_PROVIDER }}
          service_account: ${{ secrets.WIF_SERVICE_ACCOUNT }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v3

      - name: Configure Docker
        run: gcloud auth configure-docker ${{ env.REGION }}-docker.pkg.dev

      - name: Build and push Docker image
        run: |
          IMAGE="${{ env.REGION }}-docker.pkg.dev/${{ vars.GCP_PROJECT_ID }}/brewmaster/${{ env.SERVICE_NAME }}:${{ github.sha }}"
          docker build -t "$IMAGE" .
          docker push "$IMAGE"

      - name: Deploy to Cloud Run
        run: |
          gcloud run deploy ${{ env.SERVICE_NAME }} \
            --image "${{ env.REGION }}-docker.pkg.dev/${{ vars.GCP_PROJECT_ID }}/brewmaster/${{ env.SERVICE_NAME }}:${{ github.sha }}" \
            --region ${{ env.REGION }} \
            --platform managed \
            --allow-unauthenticated \
            --service-account brewmaster-api@${{ vars.GCP_PROJECT_ID }}.iam.gserviceaccount.com \
            --memory 256Mi \
            --cpu 0.25 \
            --min-instances 0 \
            --set-env-vars "GCP_PROJECT_ID=${{ vars.GCP_PROJECT_ID }},ENVIRONMENT=production" \
            --set-secrets "OPENAI_API_KEY=openai-api-key:latest,AXIOM_API_TOKEN=axiom-api-token:latest" \
            --project ${{ vars.GCP_PROJECT_ID }}
