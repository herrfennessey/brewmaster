version: "2"

linters:
  default: standard
  enable:
    # Bug Detection
    - bodyclose          # Checks HTTP response body is closed
    - nilerr             # Finds code returning nil even if error is not nil
    - nilnil             # Checks no simultaneous nil error and invalid value
    - noctx              # Finds HTTP requests without context.Context
    - contextcheck       # Checks function uses inherited context

    # Error Handling
    - errcheck           # Checks unchecked errors
    - errorlint          # Finds issues with error wrapping
    - errname            # Checks error names follow Go conventions
    - wrapcheck          # Checks errors from external packages are wrapped

    # Security
    - gosec              # Security problems inspection

    # Code Quality
    - gocritic           # Comprehensive linter with many checks
    - govet              # Reports suspicious constructs
    - staticcheck        # Comprehensive static analysis
    - unused             # Finds unused code
    - ineffassign        # Detects ineffectual assignments
    - unconvert          # Removes unnecessary type conversions
    - unparam            # Finds unused function parameters

    # Complexity
    - cyclop             # Cyclomatic complexity checker
    - gocognit           # Cognitive complexity checker
    - funlen             # Checks function length
    - nestif             # Reports deeply nested if statements

    # Style & Consistency
    - misspell           # Finds commonly misspelled words
    - whitespace         # Detects leading/trailing whitespace
    - nakedret           # Finds naked returns in long functions
    - revive             # Fast, configurable linter

    # Modern Go
    - copyloopvar        # Detects places where loop var copies are needed
    - intrange           # Suggests using integer range loops (Go 1.22+)

    # Testing
    - tparallel          # Detects inappropriate use of t.Parallel
    - thelper            # Detects test helpers without t.Helper()
    - testifylint        # Checks testify usage

  exclusions:
    presets:
      - std-error-handling
      - common-false-positives
    rules:
      - path: _test\.go
        linters:
          - funlen
          - wrapcheck
          - goconst
          - errcheck
          - gocritic
      - path: main\.go
        linters:
          - funlen
          - wrapcheck

  settings:
    cyclop:
      max-complexity: 15
      package-average: 10.0

    funlen:
      lines: 100
      statements: 50

    gocognit:
      min-complexity: 20

    nestif:
      min-complexity: 5

    gocritic:
      enabled-tags:
        - diagnostic
        - performance
        - style
      disabled-checks:
        - whyNoLint

    gosec:
      excludes:
        - G104  # Covered by errcheck

    errcheck:
      check-type-assertions: true
      check-blank: true

    errorlint:
      errorf: true
      asserts: true
      comparison: true

    govet:
      enable-all: true

    misspell:
      locale: US

    nakedret:
      max-func-lines: 30

    revive:
      rules:
        - name: blank-imports
        - name: context-as-argument
        - name: context-keys-type
        - name: dot-imports
        - name: error-return
        - name: error-strings
        - name: error-naming
        - name: exported
        - name: if-return
        - name: increment-decrement
        - name: var-naming
        - name: var-declaration
        - name: package-comments
        - name: range
        - name: receiver-naming
        - name: time-naming
        - name: unexported-return
        - name: indent-error-flow
        - name: errorf
        - name: empty-block
        - name: superfluous-else
        - name: unreachable-code

    staticcheck:
      checks:
        - all

    wrapcheck:
      ignore-sigs:
        - .Errorf(
        - errors.New(
        - errors.Unwrap(
        - errors.Join(
        - .Wrap(
        - .Wrapf(

formatters:
  enable:
    - gofmt
    - goimports
  settings:
    goimports:
      local-prefixes:
        - github.com/herrfennessey/brewmaster

output:
  formats:
    text:
      print-linter-name: true
      print-issued-lines: true

issues:
  max-issues-per-linter: 50
  max-same-issues: 5
